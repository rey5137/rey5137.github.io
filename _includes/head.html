<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">

    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
	
    <!-- Bootstrap Core CSS -->
    <link rel="stylesheet" media="screen" href="{{ "/css/bootstrap.min.css" | prepend: site.baseurl }}">

    <!-- Pygments Github CSS -->
    <link rel="stylesheet" href="{{ "/css/syntax.css" | prepend: site.baseurl }}">
	  
	<!-- Font Awesome CSS -->
	<link rel="stylesheet" media="screen" href="{{ "/css/font-awesome.min.css" | prepend: site.baseurl }}">
	
	<!-- Animate css -->
	<link rel="stylesheet" href="{{ "/css/animate.css" | prepend: site.baseurl }}">
	
	<!-- Magnific css -->
	<link rel="stylesheet" href="{{ "/css/magnific-popup.css" | prepend: site.baseurl }}">
	
	<!-- Custom styles CSS -->
	<link rel="stylesheet" media="screen" href="{{ "/css/style.css" | prepend: site.baseurl }}">
	
	<!-- Responsive CSS -->
	<link rel="stylesheet" href="{{ "/css/responsive.css" | prepend: site.baseurl }}">
		
    <!-- Custom Fonts -->
    <link href='http://fonts.googleapis.com/css?family=Roboto:400,300,500,700' rel='stylesheet' type='text/css'>

    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
	<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
	<!--[if lt IE 9]>
		<script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
		<script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
	<![endif]-->

	<link rel="shortcut icon" href="{{ "/img/ico/favicon.png" | prepend: site.baseurl }}">
	<link rel="apple-touch-icon-precomposed" sizes="144x144" href="{{ "/img/ico/apple-touch-icon-144-precomposed.png" | prepend: site.baseurl }}">
	<link rel="apple-touch-icon-precomposed" sizes="114x114" href="{{ "/img/ico/apple-touch-icon-114-precomposed.png" | prepend: site.baseurl }}">
	<link rel="apple-touch-icon-precomposed" sizes="72x72" href="{{ "/img/ico/apple-touch-icon-72-precomposed.png" | prepend: site.baseurl }}">
	<link rel="apple-touch-icon-precomposed" href="{{ "/img/ico/apple-touch-icon-57-precomposed.png" | prepend: site.baseurl }}">

</head>
